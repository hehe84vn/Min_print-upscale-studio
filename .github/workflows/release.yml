name: Publish Print Upscale Studio Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix, for example 3.0.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: print-upscale-release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Resolve and verify release version
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          REQUESTED_VERSION="${RELEASE_VERSION#v}"
          test "$PACKAGE_VERSION" = "$REQUESTED_VERSION" || { echo "Requested version $REQUESTED_VERSION does not match package $PACKAGE_VERSION"; exit 1; }
          echo "version=$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"
      - run: npm run check

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v${{ needs.validate.outputs.version }}-windows-x64
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: error
          retention-days: 14

  build-macos:
    needs: validate
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build macOS package
        run: npm run dist:mac:${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v${{ needs.validate.outputs.version }}-macos-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [validate, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print
      - name: Create stable GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Print Upscale Studio V${{ needs.validate.outputs.version }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          make_latest: true
