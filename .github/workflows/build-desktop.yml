name: Build Print Upscale Studio V2.9.4 Bundled AutoTrace Runtime

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSCAYL_RELEASE_TAG: v2.15.0
  AUTOTRACE_VERSION: 0.31.10
  AUTOTRACE_UPSTREAM_VERSION: 0.40.0
  AUTOTRACE_UPSTREAM_COMMIT: 74c796282474f33553265abbef4fc340b18c0593
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Verify source-built Windows runtime route
        run: |
          bash -n scripts/build-autotrace-windows-runtime.sh
          node -e "const p=require('./package.json'); if(p.scripts['dist:win'].includes('prepare-autotrace-windows-runtime') || p.scripts['dist:win'].includes('autotrace:prepare:win')) throw new Error('dist:win must consume the verified source-built runtime artifact');"
      - name: Run V2.9.4 syntax and fallback checks
        run: npm run check

  prepare-autotrace-windows-runtime:
    needs: validate
    runs-on: ubuntu-latest
    container: fedora:43
    timeout-minutes: 45
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Install official MinGW cross-build dependencies
        run: |
          sudo dnf update -y
          sudo dnf install -y autoconf automake file findutils gettext-devel git glib2-devel intltool libtool make \
            mingw64-binutils mingw64-filesystem mingw64-glib2 mingw64-libpng mingw64-gcc \
            pkgconf-pkg-config which
      - name: Cross-compile pinned upstream AutoTrace for Windows x64
        run: bash scripts/build-autotrace-windows-runtime.sh
      - name: Verify runtime provenance and required GCC DLLs
        run: |
          test -f vendor/autotrace/win32-x64/bin/autotrace.exe
          test -f vendor/autotrace/win32-x64/bin/libgcc_s_seh-1.dll
          test -f vendor/autotrace/win32-x64/bin/libwinpthread-1.dll
          grep -q 'upstream-fedora-mingw64-cross-compile' vendor/autotrace/win32-x64/runtime.json
          grep -q "$AUTOTRACE_UPSTREAM_COMMIT" vendor/autotrace/win32-x64/runtime.json
      - name: Upload source-built AutoTrace Windows x64 runtime
        uses: actions/upload-artifact@v4
        with:
          name: autotrace-source-built-windows-x64
          path: vendor/autotrace/win32-x64
          if-no-files-found: error
          retention-days: 14

  build-windows:
    needs:
      - validate
      - prepare-autotrace-windows-runtime
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Download source-built AutoTrace Windows x64 runtime
        uses: actions/download-artifact@v4
        with:
          name: autotrace-source-built-windows-x64
          path: vendor/autotrace/win32-x64
      - name: Verify source-built runtime manifest
        shell: pwsh
        run: |
          $manifest = Get-Content vendor/autotrace/win32-x64/runtime.json -Raw | ConvertFrom-Json
          if ($manifest.buildMethod -ne 'upstream-fedora-mingw64-cross-compile') { throw 'Unexpected Windows AutoTrace build method' }
          if ($manifest.sourceCommit -ne $env:AUTOTRACE_UPSTREAM_COMMIT) { throw 'Unexpected Windows AutoTrace source commit' }
          if (-not (Test-Path vendor/autotrace/win32-x64/bin/libgcc_s_seh-1.dll)) { throw 'Missing libgcc_s_seh-1.dll' }
          if (-not (Test-Path vendor/autotrace/win32-x64/bin/libwinpthread-1.dll)) { throw 'Missing libwinpthread-1.dll' }
      - name: Verify bundled AutoTrace without a separate installation
        run: npm run autotrace:smoke-runtime
      - name: Upload Windows AutoTrace runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autotrace-runtime-diagnostics-windows-x64
          path: runtime-smoke-diagnostics.json
          if-no-files-found: warn
      - name: Run vector smoke tests with bundled AutoTrace
        run: npm run test:smoke
      - name: Build Windows V2.9.4 installers and verify packaged runtime
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows V2.9.4 installers
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.4-windows-x64
          path: release/*.exe
          if-no-files-found: error

  build-macos-arm64:
    needs: validate
    runs-on: macos-15
    timeout-minutes: 150
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install AutoTrace build source through Homebrew
        run: brew install autotrace
      - name: Bundle relocatable AutoTrace Apple Silicon runtime and dylibs
        run: npm run autotrace:prepare -- --platform darwin --arch arm64 --strict
      - name: Verify bundled AutoTrace with Homebrew removed from PATH
        run: npm run autotrace:smoke-runtime
      - name: Upload Apple Silicon AutoTrace runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autotrace-runtime-diagnostics-macos-arm64
          path: runtime-smoke-diagnostics.json
          if-no-files-found: warn
      - name: Run vector smoke tests with bundled AutoTrace
        run: npm run test:smoke
      - name: Build macOS Apple Silicon V2.9.4 DMG and verify packaged runtime
        run: npm run dist:mac:arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS Apple Silicon V2.9.4 DMG
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.4-macos-arm64
          path: release/*.dmg
          if-no-files-found: error

  build-macos-x64:
    needs: validate
    runs-on: macos-15-intel
    timeout-minutes: 150
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install AutoTrace build source through Homebrew
        run: brew install autotrace
      - name: Bundle relocatable AutoTrace Intel runtime and dylibs
        run: npm run autotrace:prepare -- --platform darwin --arch x64 --strict
      - name: Verify bundled AutoTrace with Homebrew removed from PATH
        run: npm run autotrace:smoke-runtime
      - name: Upload Intel AutoTrace runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autotrace-runtime-diagnostics-macos-x64
          path: runtime-smoke-diagnostics.json
          if-no-files-found: warn
      - name: Run vector smoke tests with bundled AutoTrace
        run: npm run test:smoke
      - name: Build macOS Intel V2.9.4 DMG and verify packaged runtime
        run: npm run dist:mac:x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS Intel V2.9.4 DMG
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.4-macos-x64
          path: release/*.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
