name: Build Print Upscale Studio V2.9.4 Bundled AutoTrace Runtime

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSCAYL_RELEASE_TAG: v2.15.0
  AUTOTRACE_VERSION: 0.31.10
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Verify Windows runtime entry point
        run: node -e "const p=require('./package.json'); if(p.scripts['autotrace:prepare:win']!=='node scripts/prepare-autotrace-windows-runtime.mjs --strict') throw new Error('Windows AutoTrace entry point is stale');"
      - name: Run V2.9.4 syntax and fallback checks
        run: npm run check

  build-windows:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Bundle official AutoTrace Windows x64 runtime
        run: npm run autotrace:prepare:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify bundled AutoTrace without a separate installation
        run: npm run autotrace:smoke-runtime
      - name: Upload Windows AutoTrace runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autotrace-runtime-diagnostics-windows-x64
          path: runtime-smoke-diagnostics.json
          if-no-files-found: warn
      - name: Run vector smoke tests with bundled AutoTrace
        run: npm run test:smoke
      - name: Build Windows V2.9.4 installers and verify packaged runtime
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows V2.9.4 installers
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.4-windows-x64
          path: release/*.exe
          if-no-files-found: error

  build-macos-arm64:
    needs: validate
    runs-on: macos-15
    timeout-minutes: 150
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install AutoTrace build source through Homebrew
        run: brew install autotrace
      - name: Bundle relocatable AutoTrace Apple Silicon runtime and dylibs
        run: npm run autotrace:prepare -- --platform darwin --arch arm64 --strict
      - name: Verify bundled AutoTrace with Homebrew removed from PATH
        run: npm run autotrace:smoke-runtime
      - name: Upload Apple Silicon AutoTrace runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autotrace-runtime-diagnostics-macos-arm64
          path: runtime-smoke-diagnostics.json
          if-no-files-found: warn
      - name: Run vector smoke tests with bundled AutoTrace
        run: npm run test:smoke
      - name: Build macOS Apple Silicon V2.9.4 DMG and verify packaged runtime
        run: npm run dist:mac:arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS Apple Silicon V2.9.4 DMG
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.4-macos-arm64
          path: release/*.dmg
          if-no-files-found: error

  build-macos-x64:
    needs: validate
    runs-on: macos-15-intel
    timeout-minutes: 150
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install AutoTrace build source through Homebrew
        run: brew install autotrace
      - name: Bundle relocatable AutoTrace Intel runtime and dylibs
        run: npm run autotrace:prepare -- --platform darwin --arch x64 --strict
      - name: Verify bundled AutoTrace with Homebrew removed from PATH
        run: npm run autotrace:smoke-runtime
      - name: Upload Intel AutoTrace runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autotrace-runtime-diagnostics-macos-x64
          path: runtime-smoke-diagnostics.json
          if-no-files-found: warn
      - name: Run vector smoke tests with bundled AutoTrace
        run: npm run test:smoke
      - name: Build macOS Intel V2.9.4 DMG and verify packaged runtime
        run: npm run dist:mac:x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS Intel V2.9.4 DMG
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.4-macos-x64
          path: release/*.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
