name: Build Print Upscale Studio V2.9.1 Multi-Engine Vector Core

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSCAYL_RELEASE_TAG: v2.15.0

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run V2.9.1 checks
        run: npm run check

  build-windows:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Build Windows V2.9.1 installers
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows V2.9.1 installers
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.1-windows-x64
          path: release/*.exe
          if-no-files-found: error

  build-macos-arm64:
    needs: validate
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Build macOS Apple Silicon V2.9.1 DMG
        run: npm run dist:mac:arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS Apple Silicon V2.9.1 DMG
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.1-macos-arm64
          path: release/*.dmg
          if-no-files-found: error

  build-macos-x64:
    needs: validate
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run smoke tests
        run: npm run test:smoke
      - name: Build macOS Intel V2.9.1 DMG
        run: npm run dist:mac:x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS Intel V2.9.1 DMG
        uses: actions/upload-artifact@v4
        with:
          name: print-upscale-studio-v2.9.1-macos-x64
          path: release/*.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos-arm64
      - build-macos-x64
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
