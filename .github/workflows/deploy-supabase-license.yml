name: Deploy Supabase License Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/license-gateway/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-license.yml'

permissions:
  contents: read

jobs:
  deploy-license-backend:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Deploy license gateway
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy license-gateway \
            --project-ref "$SUPABASE_PROJECT_REF"
